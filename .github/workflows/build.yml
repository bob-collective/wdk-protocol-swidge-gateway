name: build
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build
      - run: pnpm test
      # Packs the tarball and installs it alongside @tetherto/wdk in a throwaway consumer tree.
      # Catches base-class identity breaks that the in-repo suite structurally cannot see.
      - run: pnpm verify:consumer
