name: NPM Publish

# Publishes @gobob/wdk-protocol-swidge-gateway to npm on a version tag push (e.g. v0.1.0).
# Uses npm OIDC trusted publishing (id-token) — configure the trusted publisher for this
# package + workflow on npmjs.com. Provenance is set in package.json.

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      - name: Resolve package version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Skip if this version is already published
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if npm view "@gobob/wdk-protocol-swidge-gateway@$VERSION" version &>/dev/null; then
            echo "Version $VERSION already on npm — skipping publish."
            echo "PUBLISH=false" >> "$GITHUB_ENV"
          else
            echo "PUBLISH=true" >> "$GITHUB_ENV"
          fi

      - name: Publish to npm
        if: env.PUBLISH == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [[ "$VERSION" == *-* ]]; then
            npm publish --access public --tag next
          else
            npm publish --access public
          fi
